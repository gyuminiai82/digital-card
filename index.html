<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <style>
        /* 기본 스타일 리셋 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        /* 배경 설정: 다크모드 및 은은한 그라데이션 효과를 위한 레이아웃 */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a; /* 기본 다크 배경 */
            overflow: hidden;
            position: relative;
        }

        /* 배경 장식용 그라데이션 오브제 (유리 느낌을 강조) */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        body::before {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            top: 20%;
            left: 20%;
            opacity: 0.4;
        }

        body::after {
            background: linear-gradient(45deg, #ec4899, #f59e0b);
            bottom: 20%;
            right: 20%;
            opacity: 0.3;
        }

        /* 글래스모피즘 카드 스타일 */
        .card {
            position: relative;
            z-index: 10;
            width: 380px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05); /* 반투명 배경 */
            backdrop-filter: blur(15px); /* 배경 흐림 */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); /* 얇은 테두리 */
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            color: white;
        }

        /* 카드 마우스 호버 효과 */
        .card:hover {
            transform: scale(1.05); /* 부드럽게 커지는 효과 */
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 프로필 이미지 자리 */
        .profile-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(45deg, #3b82f6, #ec4899); /* 테두리 그라데이션 */
        }

        .profile-image {
            width: 100%;
            height: 100%;
            background: #1e293b;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* 이미지 없을 시 아이콘 대체 */
        .profile-image svg {
            width: 50%;
            height: 50%;
            fill: #94a3b8;
        }

        /* 텍스트 스타일링 */
        .name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 연락처(이메일) 스타일 */
        .contact-link {
            display: inline-flex;
            align-items: center;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-decoration: none;
            color: #e2e8f0;
            font-size: 0.9rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .contact-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .contact-link svg {
            margin-right: 8px;
        }

        /* 하단 장식 */
        .footer-logo {
            margin-top: 30px;
            opacity: 0.3;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 프로필 이미지 섹션 -->
        <div class="profile-container">
            <div class="profile-image">
                <!-- 이미지 태그를 사용하려면 아래 주석을 해제하고 경로를 입력하세요 -->
                <img src="profile.png" alt="Profile" style="width:100%; height:100%; object-fit:cover;">
                <!-- <svg viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg> -->
            </div>
        </div>

        <!-- 정보 섹션 -->
        <h1 class="name">김규민 (Kim GyuMin)</h1>
        <p class="tagline">세상을 더 편리하게 만드는 가치를 연구하는<br>UI/UX 디자이너 & 개발자입니다.</p>
        
        <a href="mailto:gyuminiai82@gmail.com" class="contact-link">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            gyuminiai82@gmail.com
        </a>

        <div class="footer-logo">Digital Identity</div>
    </div>

</body>
</html>
